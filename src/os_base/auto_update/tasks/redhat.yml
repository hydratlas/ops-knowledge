---
# RedHat系: dnf-automatic による自動更新
- name: Install dnf-automatic
  ansible.builtin.dnf:
    name: dnf-automatic
    state: present

- name: Configure dnf-automatic to apply updates
  ansible.builtin.ini_file:
    path: /etc/dnf/automatic.conf
    section: commands
    option: apply_updates
    value: "yes"
    mode: "0644"

- name: Configure dnf-automatic reboot behavior
  ansible.builtin.ini_file:
    path: /etc/dnf/automatic.conf
    section: commands
    option: reboot
    value: "{{ 'when-needed' if auto_update_automatic_reboot | bool else 'never' }}"
    mode: "0644"

- name: Ensure dnf-automatic-install.timer drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/dnf-automatic-install.timer.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: auto_update_automatic_reboot | bool

- name: Configure dnf-automatic-install.timer jitter drop-in
  ansible.builtin.template:
    src: jitter.conf.j2
    dest: /etc/systemd/system/dnf-automatic-install.timer.d/jitter.conf
    owner: root
    group: root
    mode: "0644"
  when: auto_update_automatic_reboot | bool
  notify: Reload systemd and restart dnf-automatic-install timer

- name: Remove dnf-automatic-install.timer jitter drop-in when disabled
  ansible.builtin.file:
    path: /etc/systemd/system/dnf-automatic-install.timer.d/jitter.conf
    state: absent
  when: not (auto_update_automatic_reboot | bool)
  notify: Reload systemd and restart dnf-automatic-install timer

- name: Enable and start dnf-automatic-install.timer
  ansible.builtin.systemd:
    name: dnf-automatic-install.timer
    enabled: true
    state: started
