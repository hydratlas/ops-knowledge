---
# Debian系: unattended-upgrades による自動更新
- name: Install unattended-upgrades and needrestart
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - needrestart
    state: present

- name: Enable automatic updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: "0644"

- name: Configure allowed origins for unattended-upgrades
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Configure automatic reboot for unattended-upgrades
  ansible.builtin.template:
    src: 52unattended-upgrades-local.j2
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    owner: root
    group: root
    mode: "0644"
  when: auto_update_automatic_reboot | bool

- name: Remove automatic reboot configuration when disabled
  ansible.builtin.file:
    path: /etc/apt/apt.conf.d/52unattended-upgrades-local
    state: absent
  when: not (auto_update_automatic_reboot | bool)

- name: Ensure apt-daily-upgrade.timer drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/apt-daily-upgrade.timer.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: auto_update_automatic_reboot | bool

- name: Configure apt-daily-upgrade.timer jitter drop-in
  ansible.builtin.template:
    src: jitter.conf.j2
    dest: /etc/systemd/system/apt-daily-upgrade.timer.d/jitter.conf
    owner: root
    group: root
    mode: "0644"
  when: auto_update_automatic_reboot | bool
  notify: Reload systemd daemon

- name: Remove apt-daily-upgrade.timer jitter drop-in when disabled
  ansible.builtin.file:
    path: /etc/systemd/system/apt-daily-upgrade.timer.d/jitter.conf
    state: absent
  when: not (auto_update_automatic_reboot | bool)
  notify: Reload systemd daemon

- name: Configure needrestart for automatic restart mode
  ansible.builtin.copy:
    dest: /etc/needrestart/conf.d/auto-restart.conf
    content: |
      $nrconf{restart} = 'a';
    owner: root
    group: root
    mode: "0644"
