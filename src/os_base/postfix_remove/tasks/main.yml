---
- name: Stop and disable postfix service (systemd)
  ansible.builtin.systemd:
    name: postfix.service
    state: stopped
    enabled: false
  failed_when: false
  when: ansible_service_mgr == "systemd"

- name: Stop postfix service (OpenRC)
  ansible.builtin.command:
    cmd: rc-service postfix stop
  failed_when: false
  changed_when: false
  when: ansible_service_mgr == "openrc"

- name: Disable postfix service (OpenRC)
  ansible.builtin.command:
    cmd: rc-update del postfix
  failed_when: false
  changed_when: false
  when: ansible_service_mgr == "openrc"

- name: Remove postfix package
  ansible.builtin.package:
    name: postfix
    state: absent
