---
# 本ロールでCISモジュール無効化を有効化するかどうか
kernel_modules_disable_enabled: false

# initramfs再生成ツールのパス(os_family別)
# minimalクラウドイメージ等でツールが存在しない場合はrebuild initramfsハンドラーを
# スキップする(存在検出はtasks/main.yml、ガードはhandlers/main.yml)
kernel_modules_disable_initramfs_tool:
  Debian: /usr/sbin/update-initramfs
  RedHat: /usr/bin/dracut

# 実行中のモジュールをアンロードするかどうか
kernel_modules_disable_unload_running: false

# 無効化するカーネルモジュール一覧
# Ubuntu 24.04 LTS CIS Benchmark v1.0.0 / AlmaLinux 10 CIS Benchmark v1.0.0 を基準する
# usb-storage は含めない: 物理ホストでのUSBキーボード・USBメモリーによる保守作業やリカバリー作業で必要となるため
# overlay は含めない: Podman・Docker・LXC などのコンテナランタイムが overlayfs に依存しているため
# squashfs は含めない: snap パッケージや live ISO・インストールメディアのマウントで必要となるため
# llc は含めない: bridge モジュールの STP 実装が依存しているため

kernel_modules_disable_list:
  # --- ファイルシステム ---
  - { name: cramfs,      note: "組み込み向け圧縮FS" }
  - { name: freevxfs,    note: "Veritas FS" }
  - { name: hfs,         note: "Mac OS Classic FS" }
  - { name: hfsplus,     note: "macOS FS" }
  - { name: jffs2,       note: "組み込みフラッシュFS" }
  - { name: udf,         note: "DVD/光学メディア" }

  # --- ネットワークプロトコル(用途特殊) ---
  - { name: dccp,        note: "Datagram Congestion Control Protocol" }
  - { name: tipc,        note: "Transparent Inter-Process Communication" }
  - { name: rds,         note: "Reliable Datagram Sockets" }
  - { name: sctp,        note: "Stream Control Transmission Protocol" }
  - { name: atm,         note: "ATM networking" }
  - { name: can,         note: "CANバス(車載)" }
  - { name: can_raw,     note: "CAN raw protocol" }
  - { name: can_bcm,     note: "CAN broadcast manager" }
  - { name: can_gw,      note: "CAN gateway" }

  # --- ネットワークプロトコル(レガシー・一般) ---
  - { name: ax25,        note: "アマチュア無線AX.25" }
  - { name: netrom,      note: "アマチュア無線NetRom" }
  - { name: rose,        note: "アマチュア無線Rose" }
  - { name: x25,         note: "X.25 WAN" }

  # --- ネットワークプロトコル(レガシー・AppleTalk関連) ---
  - { name: appletalk,   note: "AppleTalkプロトコル" }
  - { name: p8022,       note: "IEEE 802.2 LLC (AppleTalkのスタブ層)" }
  - { name: p8023,       note: "IEEE 802.3 raw (AppleTalkのスタブ層)" }
  - { name: psnap,       note: "SubNetwork Access Protocol (AppleTalk用補助層)" }

  # --- ネットワークプロトコル(レガシー・新しいカーネルでは削除済み) ---
  - { name: decnet,      note: "DECnetプロトコル (kernel 6.1で削除済み)" }
  - { name: ipx,         note: "Novell IPXプロトコル (kernel 5.15で削除済み)" }

  # --- ライン規律 / シリアル ---
  - { name: n_hdlc,      note: "HDLC line discipline (過去にLPE)" }

  # --- IPsec関連 ---
  - { name: esp4,        note: "IPsec ESP IPv4" }
  - { name: esp6,        note: "IPsec ESP IPv6" }
  - { name: ipcomp4,     note: "IPsec圧縮 IPv4" }
  - { name: ipcomp6,     note: "IPsec圧縮 IPv6" }

  # --- RPC / 暗号 ---
  - { name: rxrpc,       note: "kAFS RPC" }
  - { name: algif_aead,  note: "AF_ALG非対称AEAD" }
