---
# initramfs再生成ツールが存在しないホスト(initrd無しのminimalイメージ等)では
# tasks/main.ymlのstat検出結果でガードしハンドラーをスキップする。default(false)は
# 検出タスクがwhenでスキップされた万一のケースの保険(未定義参照を避ける)。
- name: Rebuild initramfs (Debian/Ubuntu)
  ansible.builtin.command: update-initramfs -u
  when:
    - ansible_os_family == "Debian"
    - kernel_modules_disable_initramfs_tool_stat.stat.exists | default(false)
  listen: rebuild initramfs

- name: Rebuild initramfs (RHEL/AlmaLinux)
  ansible.builtin.command: dracut --force
  when:
    - ansible_os_family == "RedHat"
    - kernel_modules_disable_initramfs_tool_stat.stat.exists | default(false)
  listen: rebuild initramfs
