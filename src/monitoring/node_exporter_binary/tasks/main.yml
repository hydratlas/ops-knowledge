---
# Legacy cleanup
- name: Stop and disable legacy services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop: "{{ node_exporter_legacy_services }}"
  failed_when: false

- name: Remove legacy service files
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}"
    state: absent
  loop: "{{ node_exporter_legacy_services }}"
  register: _legacy_services_removed
  notify: reload systemd daemon

- name: Remove legacy files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ node_exporter_legacy_files }}"

# Installation
- name: Create node_exporter system group
  ansible.builtin.group:
    name: "{{ node_exporter_group }}"
    system: yes
    state: present

- name: Create node_exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    system: yes
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: no
    comment: "Prometheus Node Exporter service user"

- name: Check if node_exporter binary exists
  ansible.builtin.stat:
    path: "{{ node_exporter_binary_path }}"
  register: _node_exporter_binary

# `node_exporter --version` outputs a line like
# `node_exporter, version 1.11.1 (branch: HEAD, revision: ...)` on stdout (exit 0).
# Extract the `X.Y.Z` version string to identify the installed release.
- name: Detect installed node_exporter version
  ansible.builtin.command:
    cmd: "{{ node_exporter_binary_path }} --version"
  register: _node_exporter_installed_version_raw
  changed_when: false
  failed_when: false
  check_mode: false
  when: _node_exporter_binary.stat.exists

- name: Set installed node_exporter version fact
  ansible.builtin.set_fact:
    _node_exporter_installed_version: >-
      {{ (((_node_exporter_installed_version_raw.stdout | default(''))
            ~ (_node_exporter_installed_version_raw.stderr | default('')))
          | regex_search('node_exporter, version ([0-9]+\.[0-9]+\.[0-9]+)', '\1')
          | default([], true)) | first | default('', true) }}
  when: _node_exporter_binary.stat.exists

- name: Determine whether node_exporter binary must be (re)installed
  ansible.builtin.set_fact:
    _node_exporter_install_required: >-
      {{ ((not _node_exporter_binary.stat.exists)
          or (_node_exporter_installed_version | default('') != node_exporter_version)) | bool }}

- name: Download node_exporter archive
  ansible.builtin.get_url:
    url: "{{ node_exporter_download_url }}"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: "0644"
  when: _node_exporter_install_required

- name: Extract node_exporter binary
  ansible.builtin.command:
    cmd: >-
      tar xzf /tmp/node_exporter-{{ node_exporter_version }}.tar.gz
      -C {{ node_exporter_binary_path | dirname }}
      --strip-components=1
      node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter
  when: _node_exporter_install_required
  notify: restart node_exporter

- name: Remove node_exporter archive
  ansible.builtin.file:
    path: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    state: absent
  when: _node_exporter_install_required

- name: Set binary permissions
  ansible.builtin.file:
    path: "{{ node_exporter_binary_path }}"
    owner: root
    group: "{{ node_exporter_group }}"
    mode: "0755"
  when: not ansible_check_mode or _node_exporter_binary.stat.exists

- name: Create textfile collector directory
  ansible.builtin.file:
    path: "{{ node_exporter_textfile_directory }}"
    state: directory
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    mode: "0755"
  when: node_exporter_textfile_directory is defined

- name: Create systemd service file
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: "/etc/systemd/system/{{ node_exporter_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd daemon
    - restart node_exporter

- name: Flush handlers to ensure service manager is reloaded
  ansible.builtin.meta: flush_handlers

- name: Enable and start node_exporter service
  ansible.builtin.systemd:
    name: "{{ node_exporter_service_name }}.service"
    enabled: yes
    state: started
    daemon_reload: true

# firewalld 稼働ホスト（idm 等）向け: scrape 元から待受ポートを開放する。
# node_exporter_firewalld_sources が空のホストでは no-op。
- name: Check whether firewalld is active
  ansible.builtin.systemd:
    name: firewalld.service
  register: _node_exporter_firewalld
  failed_when: false
  changed_when: false
  when: node_exporter_firewalld_sources | length > 0

- name: Open node_exporter port for scrape sources (firewalld)
  ansible.posix.firewalld:
    rich_rule: >-
      rule family={{ 'ipv6' if (':' in item) else 'ipv4' }}
      source address={{ item }}
      port port={{ node_exporter_listen_address | regex_replace('^.*:', '') }} protocol=tcp
      accept
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ node_exporter_firewalld_sources }}"
  when:
    - node_exporter_firewalld_sources | length > 0
    - (_node_exporter_firewalld.status.ActiveState | default('')) == 'active'
