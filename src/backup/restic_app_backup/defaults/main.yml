---
# restic アプリケーション層バックアップ・ロールのデフォルト変数。
# 各アプリノードが「自分のリポジトリ」へ restic backup し、世代を刈るまでを担う。
# インフラ層（宛先 NFS・ミラー）は別系統（storage/backup_pull_sync 等）で実装済み。

# restic のバージョン。公式静的バイナリ（OS 非依存・単一系統）を全ノード共通で固定する。
restic_app_backup_version: "0.18.1"

# GitHub Releases の静的バイナリ（bzip2 圧縮）とチェックサム・ファイル。
# タグは v 付き（v0.18.1）、ファイル名は v なし（restic_0.18.1_...）である点に注意。
restic_app_backup_download_url: >-
  https://github.com/restic/restic/releases/download/v{{ restic_app_backup_version }}/restic_{{ restic_app_backup_version }}_linux_amd64.bz2
restic_app_backup_checksum_url: >-
  https://github.com/restic/restic/releases/download/v{{ restic_app_backup_version }}/SHA256SUMS

# restic バイナリの配置先。systemd の既定 PATH に含まれる /usr/local/bin を使う。
restic_app_backup_binary_path: "/usr/local/bin/restic"

# 各アプリノードが VIP NFS（rw）を介して自リポジトリへ書き込むベースディレクトリー。
# 実体マウントは storage/unified_mounts をアプリ側 group_vars で併用して用意する。
restic_app_backup_repo_base: "/mnt/backup-dst"

# リポジトリ・パスワード・ファイル（全リポジトリ共通の単一鍵）。中身は vault_restic_password。
restic_app_backup_password_file: "/etc/restic/repo.pass"

# 日次 backup 後の forget で残す世代数（参照のみ刈る。pack 解放は週次 prune）。
restic_app_backup_keep_daily: 7
restic_app_backup_keep_weekly: 4

# ジョブ定義。アプリ側の group_vars / host_vars から与える。
# 空のホストでは restic インストール・鍵配布・unit 配置をすべてスキップする
# （FreeIPA で idm-01 以外を no-op にするために必須）。
#
# 各要素のキー:
#   name:         ジョブ名（= リポジトリ名・unit インスタンス名）。例: victoriametrics
#   pre_command:  整合点を作るシェル断片（$STAGING 利用可。VM は snapshot + bind）。
#   post_command: 後始末のシェル断片（省略可。VM/VL の snapshot 削除・umount など）。
#                 注意: cleanup は post_command より先に $STAGING を rm するため、
#                 post_command から $STAGING の中身は参照できない（API 再取得などで賄う）。
#   source_path:  restic backup に渡すパス（省略時は $STAGING）。files_from とは排他。
#   files_from:   restic backup --files-from に渡すパス一覧ファイル（省略可）。pre_command が
#                 1 行 1 パスで生成する。対象が多数・可変で単一パスに束ねられない場合に使う
#                 （VL の partition snapshot 等）。指定時は source_path より優先される。
#   keep_daily / keep_weekly: 既定値の上書き（省略可）。
restic_app_backup_jobs: []
