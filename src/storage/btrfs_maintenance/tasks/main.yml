---
- name: Install btrfsmaintenance package
  ansible.builtin.apt:
    name: btrfsmaintenance
    state: present
    install_recommends: false
    update_cache: true
    cache_valid_time: 3600

- name: Enable btrfsmaintenance-refresh.path to auto-refresh timers on config change
  ansible.builtin.systemd:
    name: btrfsmaintenance-refresh.path
    enabled: true
    state: started

- name: Configure BTRFS_BALANCE_PERIOD in /etc/default/btrfsmaintenance
  ansible.builtin.lineinfile:
    path: /etc/default/btrfsmaintenance
    regexp: '^\s*BTRFS_BALANCE_PERIOD='
    line: 'BTRFS_BALANCE_PERIOD="{{ btrfs_maintenance_balance_period }}"'
    owner: root
    group: root
    mode: "0644"
  when: btrfs_maintenance_balance_period is not none
  notify: Refresh btrfsmaintenance timers

- name: Configure BTRFS_SCRUB_PERIOD in /etc/default/btrfsmaintenance
  ansible.builtin.lineinfile:
    path: /etc/default/btrfsmaintenance
    regexp: '^\s*BTRFS_SCRUB_PERIOD='
    line: 'BTRFS_SCRUB_PERIOD="{{ btrfs_maintenance_scrub_period }}"'
    owner: root
    group: root
    mode: "0644"
  when: btrfs_maintenance_scrub_period is not none
  notify: Refresh btrfsmaintenance timers
