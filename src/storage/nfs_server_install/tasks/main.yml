- name: Gather OS family fact if not available
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - "!any"
      - distribution
  when: ansible_facts['os_family'] is not defined

- name: Install nfs-utils package on RedHat-based systems
  ansible.builtin.package:
    name: nfs-utils
    state: present
  when: ansible_facts['os_family'] == "RedHat"

- name: Install nfs-kernel-server package on Debian-based systems
  ansible.builtin.package:
    name: nfs-kernel-server
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: Start and enable NFS service on RedHat-based systems
  ansible.builtin.service:
    name: nfs-server
    state: started
    enabled: yes
  when: ansible_facts['os_family'] == "RedHat"

- name: Start and enable NFS service on Debian-based systems
  ansible.builtin.service:
    name: nfs-kernel-server
    state: started
    enabled: yes
  when: ansible_facts['os_family'] == "Debian"

# /etc/nfs.conf [nfsd] の rdma / rdma-port を設定する。
# nfs_server_rdma_enabled が真のときのみ書き込み、偽のときは行を削除する。
- name: Configure NFSoRDMA (rdma) in /etc/nfs.conf
  community.general.ini_file:
    path: /etc/nfs.conf
    section: nfsd
    option: rdma
    value: "y"
    state: "{{ 'present' if (nfs_server_rdma_enabled | default(false) | bool) else 'absent' }}"
    no_extra_spaces: true
    mode: "0644"
  notify: restart-nfs-server

- name: Configure NFSoRDMA listen port (rdma-port) in /etc/nfs.conf
  community.general.ini_file:
    path: /etc/nfs.conf
    section: nfsd
    option: rdma-port
    value: "{{ nfs_server_rdma_port | default(20049) }}"
    state: "{{ 'present' if (nfs_server_rdma_enabled | default(false) | bool) else 'absent' }}"
    no_extra_spaces: true
    mode: "0644"
  notify: restart-nfs-server

# RDMA トランスポートのため svcrdma カーネルモジュールをロードしてブート時にも復活させる
- name: Ensure svcrdma module is loaded
  community.general.modprobe:
    name: svcrdma
    state: present
  when: nfs_server_rdma_enabled | default(false) | bool

- name: Persist svcrdma module across reboots
  ansible.builtin.copy:
    content: "svcrdma\n"
    dest: /etc/modules-load.d/nfs-rdma.conf
    owner: root
    group: root
    mode: "0644"
  when: nfs_server_rdma_enabled | default(false) | bool

- name: Remove persisted svcrdma module config when RDMA is disabled
  ansible.builtin.file:
    path: /etc/modules-load.d/nfs-rdma.conf
    state: absent
  when: not (nfs_server_rdma_enabled | default(false) | bool)
