---
# NFSoRDMA を有効化する場合は host_vars / group_vars で true にする。
# 真のとき /etc/nfs.conf の [nfsd] に rdma=y と rdma-port を書き込み、
# svcrdma カーネルモジュールをロードして nfs-server を再起動する。
nfs_server_rdma_enabled: false
nfs_server_rdma_port: 20049

# nfsd カーネルスレッド数。null（既定）の場合は /etc/nfs.conf の [nfsd] threads
# を明示設定しない（ディストリビューションのデフォルトに従う。Ubuntu 24.04 では 8）。
# 高帯域 NIC（10 GbE 以上、NFSoRDMA など）では 64〜128 程度を指定する。
nfs_server_threads: null
