---
# NFS サーバー自身の /etc/krb5.keytab に nfs/<fqdn> プリンシパルを冪等に取り込み、
# Kerberos NFS（sec=krb5）エクスポートを有効化するロール。
#
# 前提:
#   - FreeIPA 側で nfs/<fqdn> サービスプリンシパルが登録済みであること
#     （authentication/freeipa_nfs_service ロールで実施）。
#   - 対象ホストの /etc/krb5.keytab に host/<fqdn>@REALM が既に存在すること。
#
# 既に nfs/<fqdn> がキータブに存在する場合は no-op となる。

- name: Gather minimal facts required by this role
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - "!any"
      - distribution
  when: ansible_facts['os_family'] is not defined

- name: Check whether nfs/<fqdn> principal already exists in /etc/krb5.keytab
  ansible.builtin.command:
    cmd: klist -k /etc/krb5.keytab
  register: _nfs_kerberos_klist
  changed_when: false
  failed_when: false
  check_mode: false

- name: Set fact whether nfs/<fqdn> principal is missing
  ansible.builtin.set_fact:
    _nfs_kerberos_principal_missing: >-
      {{ _nfs_kerberos_klist.rc != 0
         or not (_nfs_kerberos_klist.stdout
                 | regex_search('\\s+nfs/' ~ (inventory_hostname | lower | regex_escape)
                                ~ '@' ~ (nfs_server_kerberos_realm | regex_escape),
                                ignorecase=True)) }}

- name: Retrieve nfs/<fqdn> keytab using a dedicated credentials cache
  when: _nfs_kerberos_principal_missing | bool
  vars:
    _nfs_kerberos_ccache: "/run/nfs_server_kerberos.ccache"
  block:
    - name: Acquire host TGT for ipa-getkeytab authentication
      ansible.builtin.command:
        cmd: "kinit -k -t /etc/krb5.keytab host/{{ inventory_hostname }}@{{ nfs_server_kerberos_realm }}"
      environment:
        KRB5CCNAME: "FILE:{{ _nfs_kerberos_ccache }}"
      register: _nfs_kerberos_kinit
      changed_when: false
      failed_when: _nfs_kerberos_kinit.rc != 0

    - name: Retrieve nfs/<fqdn> keytab into /etc/krb5.keytab
      ansible.builtin.command:
        cmd: >-
          ipa-getkeytab
          -s {{ nfs_server_kerberos_ipa_server }}
          -p nfs/{{ inventory_hostname }}
          -k /etc/krb5.keytab
      environment:
        KRB5CCNAME: "FILE:{{ _nfs_kerberos_ccache }}"
      notify: nfs-server-kerberos-keytab-changed

  always:
    - name: Destroy temporary credentials cache
      ansible.builtin.command:
        cmd: "kdestroy -c FILE:{{ _nfs_kerberos_ccache }}"
      changed_when: false
      failed_when: false
