---
- name: Ensure local backup directory exists
  ansible.builtin.file:
    path: "{{ backup_pull_sync_local_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy backup pull script
  ansible.builtin.template:
    src: backup-pull.sh.j2
    dest: /usr/local/sbin/backup-pull.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy backup prune script
  ansible.builtin.template:
    src: backup-prune.sh.j2
    dest: /usr/local/sbin/backup-prune.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy backup pull/prune systemd units
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - backup-pull.service
    - backup-pull.timer
    - backup-prune.service
    - backup-prune.timer
  notify: Reload systemd daemon

- name: Flush handlers to reload systemd before enabling timers
  ansible.builtin.meta: flush_handlers

- name: Enable and start backup pull/prune timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - backup-pull.timer
    - backup-prune.timer
