---
# unified_mounts - 統合マウント管理ロール
#
# サポートする変数形式:
#   1. unified_mounts: 直接リスト形式
#   2. unified_mount_patterns + unified_mount_selectors: パターン/セレクタ形式
#
# NFSマウントはsystemdオートマウントを使用し、非NFSマウントは従来のansible.builtin.mountを使用

# マウントリストの構築
- name: Build unified mount list
  ansible.builtin.set_fact:
    _unified_mounts_combined: >-
      {{
        (unified_mounts | default([])) +
        (unified_mount_patterns | default({}) | dict2items
          | selectattr('key', 'in', unified_mount_selectors | default([]))
          | map(attribute='value')
          | list)
      }}

# NFS/非NFSマウントの分離
- name: Separate NFS and non-NFS mounts
  ansible.builtin.set_fact:
    _unified_mounts_nfs: >-
      {{ _unified_mounts_combined | selectattr('fstype', 'in', ['nfs', 'nfs4']) | list }}
    _unified_mounts_non_nfs: >-
      {{ _unified_mounts_combined | rejectattr('fstype', 'in', ['nfs', 'nfs4']) | list }}

# 必要なパッケージのインストール（NFS）
- name: Install NFS client package on Debian-based systems
  ansible.builtin.package:
    name: nfs-common
    state: present
  when:
    - _unified_mounts_nfs | length > 0
    - ansible_facts['os_family'] == 'Debian'

- name: Install NFS client package on RHEL-based systems
  ansible.builtin.package:
    name: nfs-utils
    state: present
  when:
    - _unified_mounts_nfs | length > 0
    - ansible_facts['os_family'] == 'RedHat'

# FS-Cache（fscオプション）が使用されている場合にcachefilesdをインストール
- name: Check if any NFS mount uses fsc option
  ansible.builtin.set_fact:
    _unified_mounts_uses_fsc: >-
      {{ _unified_mounts_nfs | selectattr('opts', 'defined')
         | selectattr('opts', 'search', 'fsc') | list | length > 0 }}

- name: Install cachefilesd package on Debian-based systems
  ansible.builtin.package:
    name: cachefilesd
    state: present
  when:
    - _unified_mounts_uses_fsc
    - ansible_facts['os_family'] == 'Debian'

- name: Install cachefilesd package on RHEL-based systems
  ansible.builtin.package:
    name: cachefilesd
    state: present
  when:
    - _unified_mounts_uses_fsc
    - ansible_facts['os_family'] == 'RedHat'

- name: Ensure cachefilesd is enabled and started
  ansible.builtin.service:
    name: cachefilesd
    state: started
    enabled: true
  when: _unified_mounts_uses_fsc

# 必要なパッケージのインストール（CIFS）
- name: Install CIFS client package on Debian-based systems
  ansible.builtin.package:
    name: cifs-utils
    state: present
  when:
    - _unified_mounts_non_nfs | selectattr('fstype', 'equalto', 'cifs') | list | length > 0
    - ansible_facts['os_family'] == 'Debian'

- name: Install CIFS client package on RHEL-based systems
  ansible.builtin.package:
    name: cifs-utils
    state: present
  when:
    - _unified_mounts_non_nfs | selectattr('fstype', 'equalto', 'cifs') | list | length > 0
    - ansible_facts['os_family'] == 'RedHat'

# =============================================================================
# 非NFSマウントの処理（従来のansible.builtin.mount）
# =============================================================================

- name: Ensure mount points exist for non-NFS mounts
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
  loop: "{{ _unified_mounts_non_nfs }}"
  when: item.state | default('mounted') != 'absent'

- name: Configure and execute non-NFS mounts
  ansible.builtin.mount:
    path: "{{ item.path }}"
    src: "{{ item.src }}"
    fstype: "{{ item.fstype }}"
    opts: "{{ item.opts | default(omit) }}"
    dump: "{{ item.dump | default(0) }}"
    passno: "{{ item.passno | default(0) }}"
    state: "{{ item.state | default('mounted') }}"
  loop: "{{ _unified_mounts_non_nfs }}"

# =============================================================================
# NFSマウントの処理（systemdオートマウント）
# =============================================================================

# state: absent のNFSマウントを停止・削除
- name: Stop and disable NFS automount units for absent mounts
  ansible.builtin.systemd:
    name: "{{ item.path | regex_replace('^/', '') | regex_replace('/', '-') }}.automount"
    state: stopped
    enabled: false
  loop: "{{ _unified_mounts_nfs | selectattr('state', 'defined') | selectattr('state', 'equalto', 'absent') | list }}"
  failed_when: false

- name: Stop NFS mount units for absent mounts
  ansible.builtin.systemd:
    name: "{{ item.path | regex_replace('^/', '') | regex_replace('/', '-') }}.mount"
    state: stopped
  loop: "{{ _unified_mounts_nfs | selectattr('state', 'defined') | selectattr('state', 'equalto', 'absent') | list }}"
  failed_when: false

- name: Remove NFS automount unit files for absent mounts
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item.path | regex_replace('^/', '') | regex_replace('/', '-') }}.automount"
    state: absent
  loop: "{{ _unified_mounts_nfs | selectattr('state', 'defined') | selectattr('state', 'equalto', 'absent') | list }}"
  notify: Reload systemd daemon

- name: Remove NFS mount unit files for absent mounts
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item.path | regex_replace('^/', '') | regex_replace('/', '-') }}.mount"
    state: absent
  loop: "{{ _unified_mounts_nfs | selectattr('state', 'defined') | selectattr('state', 'equalto', 'absent') | list }}"
  notify: Reload systemd daemon

# state: absent 以外のNFSマウント処理
- name: Filter active NFS mounts
  ansible.builtin.set_fact:
    _unified_mounts_nfs_active: >-
      {{ _unified_mounts_nfs | rejectattr('state', 'defined') | list +
         _unified_mounts_nfs | selectattr('state', 'defined') | rejectattr('state', 'equalto', 'absent') | list }}

# 既存のfstabエントリをチェック（systemdオートマウントへの移行検知）
- name: Check for existing fstab entries for NFS mounts
  ansible.builtin.shell:
    cmd: "grep -q '^[^#].*{{ item.path }}[[:space:]]' /etc/fstab"
  loop: "{{ _unified_mounts_nfs_active }}"
  register: _fstab_check
  failed_when: false
  changed_when: false

# fstabエントリが存在するパスを特定
- name: Identify paths with fstab entries
  ansible.builtin.set_fact:
    _nfs_fstab_paths: >-
      {{ _fstab_check.results | selectattr('rc', 'equalto', 0) | map(attribute='item.path') | list }}

# fstabエントリが存在する場合のみアンマウント（移行時のみ）
- name: Unmount NFS mounts with fstab entries (migration to systemd)
  ansible.builtin.command:
    cmd: "umount -l {{ item.path }}"
  loop: "{{ _unified_mounts_nfs_active | selectattr('path', 'in', _nfs_fstab_paths) | list }}"
  register: _unmount_result
  failed_when: false
  changed_when: _unmount_result.rc == 0
  when: _nfs_fstab_paths | length > 0

# 既存のfstabエントリを削除（systemdオートマウントへの移行）
- name: Remove existing fstab entries for NFS mounts (migration to systemd)
  ansible.builtin.mount:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _unified_mounts_nfs_active | selectattr('path', 'in', _nfs_fstab_paths) | list }}"
  when: _nfs_fstab_paths | length > 0

# マウントポイントの作成
- name: Ensure mount points exist for NFS mounts
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
  loop: "{{ _unified_mounts_nfs_active }}"

# systemd .mount ユニットの配置
- name: Deploy NFS mount unit files
  ansible.builtin.template:
    src: nfs.mount.j2
    dest: "/etc/systemd/system/{{ item.path | regex_replace('^/', '') | regex_replace('/', '-') }}.mount"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ _unified_mounts_nfs_active }}"
  register: _nfs_mount_units
  notify: Reload systemd daemon

# systemd .automount ユニットの配置
- name: Deploy NFS automount unit files
  ansible.builtin.template:
    src: nfs.automount.j2
    dest: "/etc/systemd/system/{{ item.path | regex_replace('^/', '') | regex_replace('/', '-') }}.automount"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ _unified_mounts_nfs_active }}"
  register: _nfs_automount_units
  notify: Reload systemd daemon

# 変更があったマウントのパスを抽出（IPアドレス変更等の検知用）
- name: Identify changed NFS mount paths
  ansible.builtin.set_fact:
    _nfs_changed_paths: >-
      {{
        ((_nfs_mount_units.results | default([]) | selectattr('changed', 'equalto', true) | map(attribute='item.path') | list) +
         (_nfs_automount_units.results | default([]) | selectattr('changed', 'equalto', true) | map(attribute='item.path') | list))
        | unique
      }}

# ハンドラーを即座に実行（ユニット有効化の前にdaemon-reloadを行う）
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

# state: mounted かつ変更があったNFSマウント -> automount再起動（設定変更を反映）
- name: Restart changed NFS automount units (state=mounted)
  ansible.builtin.systemd:
    name: "{{ item.path | regex_replace('^/', '') | regex_replace('/', '-') }}.automount"
    enabled: true
    state: restarted
  loop: >-
    {{ (_unified_mounts_nfs_active | rejectattr('state', 'defined') | list +
        _unified_mounts_nfs_active | selectattr('state', 'defined') | selectattr('state', 'equalto', 'mounted') | list)
       | selectattr('path', 'in', _nfs_changed_paths) | list }}
  when: _nfs_changed_paths | length > 0

# state: mounted かつ変更がなかったNFSマウント -> automount有効化+起動
- name: Enable and start unchanged NFS automount units (state=mounted)
  ansible.builtin.systemd:
    name: "{{ item.path | regex_replace('^/', '') | regex_replace('/', '-') }}.automount"
    enabled: true
    state: started
  loop: >-
    {{ (_unified_mounts_nfs_active | rejectattr('state', 'defined') | list +
        _unified_mounts_nfs_active | selectattr('state', 'defined') | selectattr('state', 'equalto', 'mounted') | list)
       | rejectattr('path', 'in', _nfs_changed_paths) | list }}

# state: present のNFSマウント -> ユニット有効化のみ（起動しない）
- name: Enable NFS automount units without starting (state=present)
  ansible.builtin.systemd:
    name: "{{ item.path | regex_replace('^/', '') | regex_replace('/', '-') }}.automount"
    enabled: true
  loop: "{{ _unified_mounts_nfs_active | selectattr('state', 'defined') | selectattr('state', 'equalto', 'present') | list }}"

# =============================================================================
# NFS stale file handle 自動再マウント機能
# =============================================================================

# スクリプトの配置
- name: Deploy NFS stale check script
  ansible.builtin.template:
    src: nfs-stale-check.sh.j2
    dest: /usr/local/sbin/nfs-stale-check.sh
    owner: root
    group: root
    mode: "0755"
  when:
    - unified_mounts_stale_check_enabled | bool
    - _unified_mounts_nfs_active | length > 0

# systemd serviceユニットの配置
- name: Deploy NFS stale check service unit
  ansible.builtin.template:
    src: nfs-stale-check.service.j2
    dest: /etc/systemd/system/nfs-stale-check.service
    owner: root
    group: root
    mode: "0644"
  when:
    - unified_mounts_stale_check_enabled | bool
    - _unified_mounts_nfs_active | length > 0
  notify: Reload systemd daemon

# systemd timerユニットの配置
- name: Deploy NFS stale check timer unit
  ansible.builtin.template:
    src: nfs-stale-check.timer.j2
    dest: /etc/systemd/system/nfs-stale-check.timer
    owner: root
    group: root
    mode: "0644"
  when:
    - unified_mounts_stale_check_enabled | bool
    - _unified_mounts_nfs_active | length > 0
  notify: Reload systemd daemon

# ハンドラーを即座に実行
- name: Flush handlers for stale check units
  ansible.builtin.meta: flush_handlers
  when:
    - unified_mounts_stale_check_enabled | bool
    - _unified_mounts_nfs_active | length > 0

# timerの有効化と起動
- name: Enable and start NFS stale check timer
  ansible.builtin.systemd:
    name: nfs-stale-check.timer
    enabled: true
    state: started
  when:
    - unified_mounts_stale_check_enabled | bool
    - _unified_mounts_nfs_active | length > 0

# stale check機能が無効の場合、既存のユニットを停止・削除
- name: Stop NFS stale check timer when disabled
  ansible.builtin.systemd:
    name: nfs-stale-check.timer
    state: stopped
    enabled: false
  when: not (unified_mounts_stale_check_enabled | bool)
  failed_when: false

- name: Remove NFS stale check timer unit when disabled
  ansible.builtin.file:
    path: /etc/systemd/system/nfs-stale-check.timer
    state: absent
  when: not (unified_mounts_stale_check_enabled | bool)
  notify: Reload systemd daemon

- name: Remove NFS stale check service unit when disabled
  ansible.builtin.file:
    path: /etc/systemd/system/nfs-stale-check.service
    state: absent
  when: not (unified_mounts_stale_check_enabled | bool)
  notify: Reload systemd daemon

- name: Remove NFS stale check script when disabled
  ansible.builtin.file:
    path: /usr/local/sbin/nfs-stale-check.sh
    state: absent
  when: not (unified_mounts_stale_check_enabled | bool)
